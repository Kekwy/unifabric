syntax = "proto3";

package unifabric.fabric;

import "unifabric/provider/control.proto";
import "unifabric/provider/deployment.proto";
import "unifabric/provider/signaling.proto";

option java_package = "com.kekwy.unifabric.proto.fabric";
option java_multiple_files = true;

service ProviderRegistryService {
  rpc RegisterProvider(unifabric.provider.RegisterProviderRequest) returns (unifabric.provider.RegisterProviderResponse);
  rpc ControlChannel(stream unifabric.provider.ControlEnvelope) returns (stream unifabric.provider.ControlEnvelope);
  rpc DeploymentChannel(stream unifabric.provider.DeploymentEnvelope) returns (stream unifabric.provider.DeploymentEnvelope);
  rpc SignalingChannel(stream unifabric.provider.SignalingEnvelope) returns (stream unifabric.provider.SignalingEnvelope);
}
