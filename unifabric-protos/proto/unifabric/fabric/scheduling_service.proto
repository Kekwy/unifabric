syntax = "proto3";

package unifabric.fabric;

import "unifabric/fabric/scheduling.proto";

option java_package = "com.kekwy.unifabric.proto.fabric";
option java_multiple_files = true;

// 跨域调度：远程管理节点在本域执行与本地相同的筛选—评分—部署流程（论文 3.4.2）
service SchedulingService {
  rpc ScheduleDeploy(ScheduleDeployRequest) returns (ScheduleDeployResponse);
}
