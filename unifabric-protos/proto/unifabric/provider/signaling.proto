syntax = "proto3";

package unifabric.provider;

import "unifabric/provider/deployment.proto";

option java_package = "com.kekwy.unifabric.proto.provider";
option java_multiple_files = true;

// 信令通道信封：身份由 gRPC metadata 的 provider-id 提供，不在每条消息中重复
message SignalingEnvelope {
  string message_id = 1;
  string correlation_id = 2;
  int64  timestamp_ms = 3;
  string error = 4;

  oneof payload {
    ConnectInstruction connect_instruction = 10;
    IceEnvelope        ice_envelope        = 11;
    CandidateUpdate    candidate_update    = 12;
    InstanceStatusChanged instance_status_changed = 13;
    ResolveEndpointRequest resolve_endpoint_request = 14;
    ResolveEndpointResponse resolve_endpoint_response = 15;
    InstanceEndpointReport instance_endpoint_report = 16;
  }
}

// 容器级实例状态变更（异步上报）
message InstanceStatusChanged {
  string instance_id = 1;
  InstanceStatus previous_status = 2;
  InstanceStatus current_status = 3;
  string message = 4;
}

message ConnectInstruction {
  string connect_id = 1;
  string src_instance_addr = 2;
  string dst_instance_addr = 3;
  bool   initiator      = 4;
  // 可选：对端 Provider、中继地址（跨域兜底，论文 3.5.3）
  string peer_provider_id = 5;
  string relay_host = 6;
  int32  relay_port = 7;
}

// 适配器上报实例本地端点（论文 3.5.2）
message InstanceEndpointReport {
  string instance_id = 1;
  InstanceEndpoint endpoint = 2;
}

// 请求解析目标实例的对外可达代理端点（可由适配器发起，论文 3.5.2–3.5.3）
message ResolveEndpointRequest {
  string message_id = 1;
  string source_instance_id = 2;
  string source_provider_id = 3;
  string target_instance_id = 4;
}

message ResolveEndpointResponse {
  string correlation_id = 1;
  string connect_id = 2;
  InstanceEndpoint proxy_endpoint = 3;
  // LOCAL, INTRA_DOMAIN, CROSS_DOMAIN_TUNNEL, RELAY
  string connectivity_tier = 4;
  string error_message = 5;
}

message IceEnvelope {
  string connect_id    = 1;
  string from_provider_id = 2;
  string to_provider_id   = 3;
  string signal_type    = 5;
  bytes  signal_payload = 6;
}

message CandidateUpdate {
  string connect_id = 1;
  repeated NetworkCandidate candidates = 2;
}

message NetworkCandidate {
  enum CandidateType {
    CANDIDATE_TYPE_UNSPECIFIED = 0;
    DIRECT                     = 1;
    NAT_MAPPED                 = 2;
    RELAY                      = 3;
  }

  CandidateType type = 1;
  string host = 2;
  int32  port = 3;
  int32  priority = 4;
}
