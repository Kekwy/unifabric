syntax = "proto3";

package unifabric.provider;

import "unifabric/common/resource.proto";

option java_package = "com.kekwy.unifabric.proto.provider";
option java_multiple_files = true;

// 控制通道信封：仅承载心跳与资源容量上报（注册走独立一元 RPC）
message ControlEnvelope {
  string message_id = 1;
  string correlation_id = 2;
  string error = 7;

  oneof message {
    ProviderHeartbeat provider_heartbeat = 5;
    ProviderHeartbeatAck provider_heartbeat_ack = 6;
    ResourceCapacityReport resource_capacity_report = 8;
    ResourceCapacityReportAck resource_capacity_report_ack = 9;
  }
}

// ======================== 一元注册（由 ProviderRegistryService.RegisterProvider 使用） ========================

message RegisterProviderRequest {
  string provider_name = 1;
  string provider_type = 2;
  string description = 3;
  repeated string tags = 4;
  string zone = 5;
}

message RegisterProviderResponse {
  bool   accepted  = 1;
  string provider_id = 2;
  string message   = 3;
}

message ProviderHeartbeat {
  string provider_id    = 1;
  int64  timestamp_ms = 2;
  repeated string tags = 3;
}

message ProviderHeartbeatAck {
  bool acknowledged = 1;
}

message ResourceCapacityReport {
  string provider_id = 1;
  int64  timestamp_ms = 2;
  unifabric.common.ResourceCapacity capacity = 3;
}

message ResourceCapacityReportAck {
  bool acknowledged = 1;
}
