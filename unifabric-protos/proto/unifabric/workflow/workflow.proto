syntax = "proto3";

package iarnet.workflow;

import "iarnet/common/function.proto";
import "iarnet/common/resource.proto";
import "iarnet/common/type.proto";

option java_package = "com.kekwy.unifabric.proto.workflow";
option java_multiple_files = true;

// ======================== 工作流图（顶层） ========================

// 工作流输入参数定义（参数名 + 类型），实际值在提交时由用户提供
message WorkflowInput {
  string        name = 1;
  common.Type   type = 2;
}

message WorkflowGraph {
  string   workflow_id      = 1;
  string   application_id   = 2;
  string   name             = 3;
  repeated Node nodes       = 4;
  repeated Edge edges      = 5;
  repeated WorkflowInput inputs = 6;
}

// ======================== 边 ========================

message Edge {
  string   from_node_id = 1;
  string   to_node_id   = 2;
  optional common.FunctionDescriptor conditionFunction = 3;
  int32    output_port  = 4;   // 源节点的输出端口（无条件=0，条件分支从 1 自增）
  int32    input_port   = 5;   // 目标节点的输入端口（Combine: 0=left, 1=right；其他节点=0）
}

// ======================== 节点 ========================

enum NodeKind {
  NODE_KIND_UNSPECIFIED = 0;
  NODE_KIND_INPUT       = 1;
  NODE_KIND_TASK        = 2;
  NODE_KIND_OUTPUT      = 3;
  NODE_KIND_COMBINE     = 4;
}

message Node {
  string   id          = 1;
  string   name        = 2;
  common.FunctionDescriptor function      = 3;
  NodeConfig nodeConfig = 4;
  NodeKind node_kind    = 5;
  // 入口节点关联的工作流输入参数名（仅当该节点从 workflow input 接收数据时设置）
  string   input_param = 6;
}

message NodeConfig {
  int32               replicas      = 1;
  common.ResourceSpec resource_spec      = 2;
}
