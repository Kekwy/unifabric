syntax = "proto3";

package iarnet.actor;

import "iarnet/common/type.proto";

option java_package = "com.kekwy.unifabric.proto.actor";
option java_multiple_files = true;

message ActorEnvelope {
  oneof payload {
    StartInputCommand start_input_command = 2;  // 命令 input Actor 开始产生输入
    RegisterActorRequest register_actor = 3;    // Actor 启动后向 Provider 报告 actor_id
    InvokeResponse response = 4;                            // Actor 产出的一行数据
    InvokeRequest request = 5;
  }
}

message InvokeResponse {
  string executionId = 1;
  DataRow row = 2;
  int32 port = 3;
}

message InvokeRequest {
  string executionId = 1;
  DataRow row = 2;
  int32   input_port = 3;   // 数据对应目标节点的哪个输入端口
}

// 命令 input Actor 开始产生输入
message StartInputCommand {
}

// Actor 向 Provider 注册时携带的 actor_id
message RegisterActorRequest {
  string actor_id = 1;
}

// 一行数据，用于 Actor 间经 Provider 路由
message DataRow {
  string rowId = 1;
  common.Value value = 2;
}
