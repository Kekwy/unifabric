syntax = "proto3";

package iarnet.application;

import "iarnet/common/type.proto";

option java_package = "com.kekwy.unifabric.proto.application";
option java_multiple_files = true;

service ApplicationService {
  rpc submitJar(SubmitJarRequest) returns (SubmitJarResponse);
  // 提交 JAR 并携带输入，便于测试：输入会写入工作空间 input.json，进程可读取
  rpc submitJarWithInput(SubmitJarWithInputRequest) returns (SubmitJarWithInputResponse);
}

message SubmitJarRequest {
  bytes content = 1;
}

message SubmitJarResponse {
  string msg = 1;
}

message SubmitJarWithInputRequest {
  bytes content = 1;
  repeated InputEntry inputs = 2;        // 单组输入（向后兼容）
  repeated InputGroup input_groups = 3;   // 多组输入，每组触发一次 execute
}

message InputEntry {
  string key = 1;
  common.Value value = 2;
}

// 一组输入，对应一次工作流 execute
message InputGroup {
  repeated InputEntry entries = 1;
}

message SubmitJarWithInputResponse {
  string msg = 1;
}
